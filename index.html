    <script>
        const refreshBtn = document.getElementById('refreshImage');
        const bgAnnounce = document.getElementById('bg-announce');

        function setLoading(state) {
            refreshBtn.style.opacity = state ? '0.6' : '1';
            refreshBtn.style.pointerEvents = state ? 'none' : 'auto';
            refreshBtn.textContent = state ? 'Loading...' : 'Refresh Image';
        }

        function changeBackground() {
            setLoading(true);
            const timestamp = Date.now();
            const newUrl = `https://picsum.photos/1920/1080?blur=2&random=${timestamp}`;
            const img = new Image();
            img.onload = function () {
                document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), url('${newUrl}')`;
                void document.body.offsetWidth;
                bgAnnounce.textContent = 'Background image refreshed';
                setTimeout(() => bgAnnounce.textContent = '', 1000);
                setLoading(false);
            };
            img.onerror = () => { console.error('Failed to load image'); setLoading(false); };
            img.src = newUrl;
        }

        changeBackground();
        refreshBtn.addEventListener('click', (e) => { e.preventDefault(); changeBackground(); });
    </script>

    <script>
        const clock = document.getElementById('clock');
        const hourHand = document.getElementById('hour');
        const minuteHand = document.getElementById('minute');
        const secondHand = document.getElementById('second');

        let currentSecond = -1; // to detect when the second actually changes

        function createNumbers() {
            document.querySelectorAll('.number').forEach(el => el.remove());
            const radius = window.innerWidth <= 640 ? -115 : -155;
            for (let i = 1; i <= 12; i++) {
                const num = document.createElement('div');
                num.className = 'number';
                num.textContent = i;
                const angle = i * 30;
                num.style.transform = `rotate(${angle}deg) translateY(${radius}px) rotate(-${angle}deg)`;
                clock.appendChild(num);
            }
        }

        createNumbers();
        window.addEventListener('resize', createNumbers);

        // Minute marks (unchanged)
        for (let i = 0; i < 60; i++) {
            const mark = document.createElement('div');
            mark.className = i % 5 === 0 ? 'five-minute-mark' : 'minute-mark';
            mark.style.transform = `rotate(${i * 6}deg)`;
            clock.appendChild(mark);
        }

        function updateClock() {
            const now = new Date();
            const s = now.getSeconds();
            const ms = now.getMilliseconds();
            const m = now.getMinutes() + (s + ms / 1000) / 60;
            const h = (now.getHours() % 12) + m / 60;

            // Smooth hour & minute hands
            minuteHand.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1)';
            hourHand.style.transition = 'transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1)';
            minuteHand.style.transform = `rotate(${m * 6}deg) translate(0px, -11px)`;
            hourHand.style.transform = `rotate(${h * 30}deg) translate(0px, -11px)`;

            // === Mechanical "tick" for seconds ===
            if (s !== currentSecond) {
                // New second has started → trigger the tick animation
                currentSecond = s;

                // Remove any previous animation
                secondHand.style.transition = 'none';
                secondHand.style.transform = `rotate(${s * 6}deg) translate(0px, -11px)`;

                // Force reflow so the next transition is respected
                void secondHand.offsetWidth;

                // Add the "hack" (tiny bounce backward) then snap forward
                // This mimics the real mechanical escapement
                secondHand.style.transition = 'transform 0.08s cubic-bezier(0.1, 0.7, 0.1, 1)';
                secondHand.style.transform = `rotate(${s * 6 - 5}deg) translate(0px, -11px)`;

                setTimeout(() => {
                    secondHand.style.transition = 'transform 0.12s cubic-bezier(0.25, 0.9, 0.3, 1)';
                    secondHand.style.transform = `rotate(${s * 6}deg) translate(0px, -11px)`;
                }, 20);
            }
        }

        // Run as fast as possible for perfect tick timing
        setInterval(updateClock, 16);
        updateClock();
    </script>
