    <main id="main-content" tabindex="-1">
        <div class="card" role="form" aria-labelledby="contact-heading">
            <h1 id="contact-heading">Contact Me</h1>

            <div id="form-status" role="status" aria-live="polite"></div>

            <form id="contact-form" class="contact-form" novalidate>
                <label for="name">
                    <span class="visually-hidden">Full name</span>
                    <input type="text" id="name" name="name" placeholder="Name*" required aria-required="true">
                </label>

                <label for="email">
                    <span class="visually-hidden">Email address</span>
                    <input type="email" id="email" name="email" placeholder="Email*" required aria-required="true">
                </label>

                <label style="opacity:.3; pointer-events:none;">
                    <input type="text" name="phone_visible" disabled placeholder="Phone" aria-hidden="true">
                </label>

                <div class="hp" aria-hidden="true">
                    <input type="text" name="phone" tabindex="-1" autocomplete="off">
                    <input type="text" name="confirm_email" tabindex="-1" autocomplete="off">
                </div>

                <label for="subject">
                    <span class="visually-hidden">Message subject</span>
                    <input type="text" id="subject" name="subject" placeholder="Subject">
                </label>

                <label for="message">
                    <span class="visually-hidden">Your message</span>
                    <textarea id="message" name="message" rows="6" placeholder="Message*" required
                        aria-required="true"></textarea>
                </label>

                <input type="hidden" name="timestamp" id="form-timestamp">
                <input type="hidden" name="g-recaptcha-response" id="recaptcha-token">

                <button type="submit" id="submit-btn" aria-label="Send your message">
                    <span id="btn-text"><strong>Send</strong> Message</span>
                    <span id="btn-loading" style="display:none;" aria-hidden="true">Sending…</span>
                </button>
            </form>
        </div>
    </main>

    <!-- Scripts (same as before, just cleaned up) -->
    <script>
        // Check if grecaptcha actually loaded before calling it
        function initRecaptcha() {
            if (typeof grecaptcha !== 'undefined') {
                grecaptcha.ready(() => {
                    grecaptcha.execute('6LcCTx8sAAAAAEErCqFOlmpintcGJDVVxTDA4nZH', { action: 'contact' }).then(token => {
                        const tokenInput = document.getElementById('recaptcha-token');
                        if (tokenInput) tokenInput.value = token;
                    });
                });
            } else {
                console.warn("reCAPTCHA blocked by browser/VPN. Submission may fail backend verification.");
            }
        }
        window.addEventListener('load', initRecaptcha);

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('form-timestamp').value = Date.now();
        });

        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoading = document.getElementById('btn-loading');

        document.getElementById('contact-form').addEventListener('submit', async e => {
            e.preventDefault();
            submitBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline';

            const token = await grecaptcha.execute('6LcCTx8sAAAAAEErCqFOlmpintcGJDVVxTDA4nZH', { action: 'contact' });
            document.getElementById('recaptcha-token').value = token;

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            const msg = document.getElementById('form-status');
            msg.innerHTML = '';

            try {
                const res = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (res.ok) {
                    msg.innerHTML = `<p class="success">Thank you! I'll get back to you soon.</p>`;
                    e.target.reset();
                    if (typeof confetti === 'function') confetti();
                } else throw new Error(result.error || 'Failed to send');
            } catch (err) {
                msg.innerHTML = `<p class="error">${err.message}</p>`;
            } finally {
                submitBtn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
            }
        });

        function dayForNight(el) {
            document.body.classList.toggle('light');
            [...el.children].forEach(kid => kid.classList.toggle('inactive'));
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js" defer></script>
